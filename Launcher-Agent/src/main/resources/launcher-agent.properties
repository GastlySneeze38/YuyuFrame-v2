# ============================================================
#  launcher-agent.properties — Configuration runtime LauncherAgent
#
#  Ce fichier est embarqué dans le JAR (resources/).
#  Pour override sans recompiler, copier dans :
#    %APPDATA%\YuyuFrame\launcheragent\launcher-agent.properties
#  Le fichier externe prend la priorité sur le JAR embarqué.
# ============================================================

# ── LOGS (seuils par catégorie) ─────────────────────────────
# 0 = désactivé
# 1 = verbose  (tout)
# 2 = info + critique
# 3 = critique seul
log.ui=1
log.asm=1
log.agent=1
log.content=2

# Préfixe [CATEGORIE] devant chaque message
log.show_category=true

# ── MIXIN FRAMEWORK DEBUG ────────────────────────────────────
mixin.debug.export=false
mixin.debug.verify=false
mixin.debug.verbose=false
mixin.debug.strict=false
mixin.debug.profiler=false
mixin.dump_on_failure=false
